# CI/CD фронтенда (skinemsya_ui) → staging VPS.
# Backend деплоится отдельно из репозитория skinemsya_java.
# Документация: skinemsya_java/docs/deployment/staging-server.md

stages:
  - test
  - build
  - deploy

variables:
  DEPLOY_PATH: /opt/skinemsya
  FRONTEND_PATH: /opt/skinemsya/deploy/frontend

cache:
  paths:
    - node_modules/

test:typecheck:
  stage: test
  image: node:22-bookworm-slim
  script:
    - npm ci
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

build:
  stage: build
  image: node:22-bookworm-slim
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:staging:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
  environment:
    name: staging
    url: https://skinemsya-vse.ru
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - ssh -p "${STAGING_SSH_PORT:-22}" "$STAGING_USER@$STAGING_HOST" "mkdir -p $FRONTEND_PATH"
    - rsync -avz --delete -e "ssh -p ${STAGING_SSH_PORT:-22}" dist/ "$STAGING_USER@$STAGING_HOST:$FRONTEND_PATH/"
