# CI/CD фронтенда: typecheck, сборка, деплой статики на staging VPS.
# Инструкция: docs/DEPLOYMENT.md

name: Frontend CI/CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: Задеплоить на staging после сборки
        type: boolean
        default: false

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/skinemsya
  FRONTEND_PATH: /opt/skinemsya/deploy/frontend

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 3

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_staging
    environment:
      name: staging
      url: https://skinemsya-vse.ru
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "SSH_PRIVATE_KEY secret is invalid. Paste the full private key file, including BEGIN/END lines." >&2
            exit 1
          fi
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${STAGING_SSH_PORT:-22}" "$STAGING_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Sync static files
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -p ${STAGING_SSH_PORT:-22}"
          ssh $SSH_OPTS "${STAGING_USER}@${STAGING_HOST}" "mkdir -p ${FRONTEND_PATH}"
          rsync -avz --delete -e "ssh $SSH_OPTS" dist/ "${STAGING_USER}@${STAGING_HOST}:${FRONTEND_PATH}/"
