name: Frontend Production

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Override semver version (optional)
        required: false
        type: string

concurrency:
  group: deploy-production-frontend
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_tag: ${{ steps.version.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(node -p "require('./package.json').version")"
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 || true)"
            if [ -n "${latest_tag}" ]; then
              tag_version="${latest_tag#v}"
              tag_version="${tag_version%-rc}"
              if [[ "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
                version="${tag_version}"
              fi
            fi
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "Unable to resolve semver version: ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  verify:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/frontend-verify
        with:
          upload_dist: 'true'
          artifact_name: frontend-dist

  deploy:
    name: Deploy production
    needs: [resolve-version, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://skinemsya-vse.ru
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - uses: ./.github/actions/deploy-frontend
        with:
          version: ${{ needs.resolve-version.outputs.version }}
          health_url: https://skinemsya-vse.ru/
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          production_host: ${{ secrets.PRODUCTION_HOST }}
          production_user: ${{ secrets.PRODUCTION_USER }}
          production_ssh_port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          ssh_known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

  publish-release:
    name: Publish GitHub Release
    needs: [resolve-version, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: v${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          body: |
            Production frontend release **v${{ needs.resolve-version.outputs.version }}**.

            Static files deployed to `/opt/skinemsya/deploy/frontend/`.
            Tag: `${{ needs.resolve-version.outputs.sha_tag }}`
